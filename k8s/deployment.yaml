apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeassignment-api
  labels:
    app: kubeassignment-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeassignment-api
  template:
    metadata:
      labels:
        app: kubeassignment-api
    spec:
      containers:
        - name: kubeassignment-api
          image: ${{DOCKERHUB_USERNAME}}/kubeassignment-api:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 260m
              memory: 256Mi
